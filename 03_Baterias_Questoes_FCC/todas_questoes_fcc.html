<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Questões FCC — TJ-CE 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1>Simulador FCC Premium</h1>
            <p class="subtitle">Treinamento intensivo para Analista de TI do TJ-CE 2026. Responda às questões e acompanhe sua evolução.</p>
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-val" id="stat-total">...</div>
                    <div class="stat-lbl">Questões</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-days">...</div>
                    <div class="stat-lbl">Dias Mapeados</div>
                </div>
                <div class="stat-card" style="border-color: var(--success); box-shadow: 0 0 15px rgba(16,185,129,0.2);">
                    <div class="stat-val" id="stat-solved" style="color: var(--success);">0%</div>
                    <div class="stat-lbl">Respondidas</div>
                </div>
            </div>
        </div>
    </header>

    <div class="toolbar">
        <div class="toolbar-container">
            <div class="day-selector-container">
                <button id="btn-prev-day" class="btn-nav-day" title="Dia Anterior">◀</button>
                <div class="dropdown-wrapper">
                    <button id="day-selector-trigger" class="day-selector-trigger">
                        <span class="calendar-icon">📅</span>
                        <span id="selected-day-label">Carregando...</span>
                        <span class="arrow">▼</span>
                    </button>
                    <div id="day-selector-dropdown" class="day-selector-dropdown">
                        <div class="dropdown-header">
                            <button id="btn-select-all" class="btn-filter-all">Ver Todas as Questões</button>
                        </div>
                        <div class="weeks-grid" id="weeks-grid">
                            <!-- Semanas e dias serão renderizados dinamicamente aqui -->
                        </div>
                    </div>
                </div>
                <button id="btn-next-day" class="btn-nav-day" title="Próximo Dia">▶</button>
            </div>
        </div>
    </div>

    <main>
        <div id="questions-container">
            <!-- Questões renderizadas dinamicamente pelo JS -->
            <div class="loading">Carregando banco de questões...</div>
        </div>
        
        <div id="pagination" class="pagination" style="display: none;">
            <button id="btn-prev" class="btn-page">Anterior</button>
            <span id="page-info" class="page-info">Página 1</span>
            <button id="btn-next" class="btn-page">Próxima</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
